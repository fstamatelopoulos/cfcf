<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Cache-busting for the SPA host page (item 6.25 follow-up, 2026-05-02).

      Vite's content-hashed asset filenames (e.g. `/assets/index-BjADqkJe.js`)
      make the JS / CSS bundles safely cacheable, BUT index.html itself is
      what tells the browser which hashed assets to load. If browsers cache
      index.html, users navigating after a server upgrade can still load the
      OLD index.html → OLD asset hashes → OLD JS still in memory, even
      though the server is now serving a newer cfcf.

      Symptom (2026-05-02): a paused loop with the new server-side
      `pauseReason: "scope_complete"` rendered the A1 default action set
      because the user's browser had a cached SPA from a previous build
      (which didn't have the `case "scope_complete":` branch). Server text
      was fresh; client logic was stale.

      Fix: tell browsers + intermediate proxies NEVER to cache this tiny
      (~0.4 KB) host page. The hashed assets it references stay cacheable,
      so the bandwidth cost is one round-trip for index.html per page load.
    -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>cf² -- Cerefox Code Factory</title>
    <!--
      Theme pre-paint (item 6.12). Reads localStorage BEFORE React mounts
      and sets `data-theme` on <html> so the page renders in the correct
      theme on first paint -- no flash of opposite theme. The useTheme
      hook later syncs from cfcf global config and writes back if
      different. "auto" deliberately leaves data-theme unset so the CSS
      `prefers-color-scheme` media query controls the page.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("cfcf:theme");
          if (t === "dark" || t === "light") {
            document.documentElement.setAttribute("data-theme", t);
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
