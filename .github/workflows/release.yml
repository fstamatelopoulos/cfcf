name: release

# Trigger: workflow_dispatch ONLY (decided 2026-04-26).
# Tagging and releasing are deliberately separated:
#   - tagging is a developer milestone marker (no workflow runs)
#   - releasing is an explicit publish act, run via this workflow
# Run via the GitHub Actions UI ("Run workflow" → enter tag) or
#   gh workflow run release.yml -f tag=v0.10.0
#
# Reference: docs/research/installer-design.md §5.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build from (e.g. v0.10.0). Must already exist + be reachable from main.'
        required: true
        type: string
      prerelease:
        description: 'Mark this as a prerelease (does not become "latest").'
        required: false
        type: boolean
        default: false
      publish_to_npm:
        description: 'Also publish @cerefox/codefactory + @cerefox/codefactory-native-* to npmjs.com. Irreversible -- npm version numbers are reserved forever once published. Default OFF: GitHub Release only.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write      # gh release create
  actions: read

# Force JavaScript-based actions onto Node 24 (workaround for the
# Node 20 deprecation warning on `actions/upload-artifact@v5` etc.).
# Drop this once all the actions we use ship a Node 24 default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  # ── sanity: tag must exist + be reachable from main ────────────────
  verify:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag → sha + verify on main
        id: resolve
        run: |
          if ! git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag '${{ inputs.tag }}' does not exist. Tag locally + push first."
            exit 1
          fi
          sha="$(git rev-parse "refs/tags/${{ inputs.tag }}^{}")"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          git fetch origin main
          if ! git merge-base --is-ancestor "$sha" origin/main; then
            echo "::error::Tag '${{ inputs.tag }}' (sha $sha) is not an ancestor of main."
            exit 1
          fi

  # ── per-platform native package build ──────────────────────────────
  # Compiles the pinned libsqlite3 + downloads the matching sqlite-vec
  # asset, packs them into @cerefox/codefactory-native-<platform>-X.Y.Z.tgz.
  #
  # Both Mac legs run on macos-14 (arm64). darwin-arm64 builds natively;
  # darwin-x64 cross-compiles via clang's `-arch x86_64` flag, plumbed
  # through scripts/build-sqlite.sh's existing per-platform arch_flag
  # handling. macos-13 (Intel) runners are being phased out by GitHub +
  # have multi-hour queue times on free-tier; cross-compilation from
  # macos-14 is reliable, ~3x faster, and uses one less concurrent
  # runner slot. Decision: 2026-04-30.
  build-native:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # arm64 runner; native build
            platform: darwin-arm64
          - os: macos-14          # arm64 runner; cross-compiles -arch x86_64
            platform: darwin-x64
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build native package
        run: scripts/build-native-package.sh "${{ matrix.platform }}" "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v5
        with:
          name: cfcf-native-${{ matrix.platform }}
          retention-days: 1
          path: |
            dist/cerefox-codefactory-native-${{ matrix.platform }}-*.tgz
            dist/cerefox-codefactory-native-${{ matrix.platform }}-*.tgz.sha256

  # ── single CLI build ────────────────────────────────────────────────
  # The bundled JS is platform-independent (the heavy native deps are
  # externalised; per-platform native lives in build-native above), so
  # one build leg covers all OSes.
  build-cli:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace deps (needed by bun run build:web)
        run: bun install --frozen-lockfile

      - name: Build CLI tarball
        run: scripts/build-cli.sh "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v5
        with:
          name: cfcf-cli
          retention-days: 1
          path: |
            dist/cfcf-*.tgz
            dist/cfcf-*.tgz.sha256

  # ── assemble + publish release ─────────────────────────────────────
  release:
    needs: [build-native, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Assemble SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -- *.sha256

      - name: Write MANIFEST.txt
        # Small key:value file so self-update + install.sh can resolve
        # "latest" by following GitHub's release redirect to MANIFEST.txt
        # and parsing the cfcf: line. See packages/cli/src/commands/
        # self-update.ts.
        run: |
          version="${{ inputs.tag }}"
          v_no_prefix="${version#v}"
          cat > dist/MANIFEST.txt <<EOF
          cfcf: $version
          cli-tarball: cfcf-${v_no_prefix}.tgz
          built-at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Copy install script
        run: cp scripts/install.sh dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flag="--latest"
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then flag="--prerelease"; fi
          gh release create "${{ inputs.tag }}" \
            --title "${{ inputs.tag }}" \
            --generate-notes \
            --verify-tag \
            $flag \
            dist/cfcf-*.tgz \
            dist/cerefox-codefactory-native-*.tgz \
            dist/SHA256SUMS \
            dist/MANIFEST.txt \
            dist/install.sh

  # ── npm publish dry-run (always runs; canary) ──────────────────────
  # Validates each tarball's shape against the npm registry without
  # actually publishing. Catches problems that would only otherwise
  # surface during the real publish: malformed package.json, version
  # already taken, name not under our scope, files missing from the
  # tarball, etc. ~5s of cheap signal that runs on every release run
  # regardless of whether the user opted into the real publish leg.
  #
  # No auth needed: dry-run doesn't push anything, so NPM_TOKEN is not
  # consumed here. (If a future npm change ever required auth for
  # dry-run, this job would surface that loudly before the real-publish
  # leg ever runs.)
  npm-dryrun:
    needs: [build-native, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: npm publish --dry-run (native packages)
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/cerefox-codefactory-native-*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "::error::no native tarballs found in dist/"
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            echo "::group::dry-run $tgz"
            npm publish --dry-run "$tgz"
            echo "::endgroup::"
          done

      - name: npm publish --dry-run (CLI)
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/cfcf-*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "::error::no CLI tarballs found in dist/"
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            echo "::group::dry-run $tgz"
            npm publish --dry-run "$tgz"
            echo "::endgroup::"
          done

  # ── npm publish (real; gated + irreversible) ───────────────────────
  # Only runs when the user explicitly checks `publish_to_npm` in the
  # workflow_dispatch UI. Order matters: native packages first (so the
  # CLI's optionalDependencies entries already exist on the registry
  # by the time the CLI manifest lands), CLI second.
  #
  # `--access public` is required on first publish under a scoped name
  # (`@cerefox/...`); npm remembers the setting after that. Set on every
  # call so a fresh package's first publish is always public-by-default.
  #
  # Auth: NODE_AUTH_TOKEN is the standard env var actions/setup-node
  # configures npm CLI to read. It must be a granular access token
  # scoped to `@cerefox/codefactory` + `@cerefox/codefactory-native-*`
  # (decided 2026-04-29; see docs/research/npm-publish-5.5b-audit.md
  # R3). Stored as `secrets.NPM_TOKEN` on the repo. Until the user adds
  # it (step 8 of the 8-step plan), this job will fail with a clear
  # auth error -- which is the correct behaviour: irreversible publish
  # should NOT silently succeed without credentials, but more
  # importantly should NOT happen by accident before the user is ready.
  #
  # Recommended: bind this job to a GitHub Environment (`npm-publish`)
  # with a required-reviewers approval rule. Configured outside the
  # workflow file (Settings → Environments) so the YAML stays clean.
  npm-publish:
    needs: [build-native, build-cli, npm-dryrun]
    if: ${{ inputs.publish_to_npm }}
    runs-on: ubuntu-latest
    # environment: npm-publish    # uncomment after creating the env
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: npm publish (native packages, first)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/cerefox-codefactory-native-*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "::error::no native tarballs found in dist/"
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            echo "::group::publish $tgz"
            npm publish --access public "$tgz"
            echo "::endgroup::"
          done

      - name: npm publish (CLI, last)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/cfcf-*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "::error::no CLI tarballs found in dist/"
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            echo "::group::publish $tgz"
            npm publish --access public "$tgz"
            echo "::endgroup::"
          done

      - name: Print install hint
        run: |
          echo "::notice::Published to npmjs.com. Install with: bun install -g @cerefox/codefactory"
