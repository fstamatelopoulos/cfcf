name: release

# Trigger: workflow_dispatch ONLY (decided 2026-04-26).
# Tagging and releasing are deliberately separated:
#   - tagging is a developer milestone marker (no workflow runs)
#   - releasing is an explicit publish act, run via this workflow
# Run via the GitHub Actions UI ("Run workflow" → enter tag) or
#   gh workflow run release.yml -f tag=v0.10.0
#
# Reference: docs/research/installer-design.md §6.1.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build from (e.g. v0.10.0). The tag must already exist on the repo and be reachable from main.'
        required: true
        type: string
      prerelease:
        description: 'Mark this as a prerelease (does not become "latest").'
        required: false
        type: boolean
        default: false

permissions:
  contents: write      # gh release create
  actions: read

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  # ── sanity: tag must exist + be reachable from main ────────────────
  verify:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag → sha + verify on main
        id: resolve
        run: |
          if ! git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag '${{ inputs.tag }}' does not exist. Tag locally + push first."
            exit 1
          fi
          sha="$(git rev-parse "refs/tags/${{ inputs.tag }}^{}")"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          # Make sure main is up to date locally before the ancestor check.
          git fetch origin main
          if ! git merge-base --is-ancestor "$sha" origin/main; then
            echo "::error::Tag '${{ inputs.tag }}' (sha $sha) is not an ancestor of main."
            exit 1
          fi

  # ── per-platform build ──────────────────────────────────────────────
  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # arm64 runner
            platform: darwin-arm64
            bun-target: bun-darwin-arm64
          - os: macos-13          # x64 runner (Intel)
            platform: darwin-x64
            bun-target: bun-darwin-x64
          - os: ubuntu-latest
            platform: linux-x64
            bun-target: bun-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}     # build from the tagged commit, not HEAD

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace deps (for bun build:web)
        run: bun install

      - name: Build per-platform tarball
        run: scripts/build-release-tarball.sh "${{ inputs.tag }}"
        env:
          PLATFORM: ${{ matrix.platform }}
          BUN_TARGET: ${{ matrix.bun-target }}

      - name: Smoke-test tarball
        run: scripts/smoke-tarball.sh "dist/cfcf-${{ matrix.platform }}-${{ inputs.tag }}.tar.gz" "${{ matrix.platform }}"

      - uses: actions/upload-artifact@v4
        with:
          name: cfcf-${{ matrix.platform }}
          retention-days: 14         # short window: artifacts only used during the release run
          path: |
            dist/cfcf-${{ matrix.platform }}-${{ inputs.tag }}.tar.gz
            dist/cfcf-${{ matrix.platform }}-${{ inputs.tag }}.tar.gz.sha256

  # ── assemble SHA256SUMS + publish release ──────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Assemble SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -- *.sha256

      - name: Write MANIFEST.txt (release-level)
        run: scripts/write-manifest.sh "${{ inputs.tag }}" dist/MANIFEST.txt

      - name: Copy install scripts
        run: |
          cp scripts/install.sh dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flag="--latest"
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then flag="--prerelease"; fi
          gh release create "${{ inputs.tag }}" \
            --title "${{ inputs.tag }}" \
            --generate-notes \
            --verify-tag \
            $flag \
            dist/*.tar.gz dist/SHA256SUMS dist/MANIFEST.txt dist/install.sh
