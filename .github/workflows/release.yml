name: release

# Trigger: workflow_dispatch ONLY (decided 2026-04-26).
# Tagging and releasing are deliberately separated:
#   - tagging is a developer milestone marker (no workflow runs)
#   - releasing is an explicit publish act, run via this workflow
# Run via the GitHub Actions UI ("Run workflow" → enter tag) or
#   gh workflow run release.yml -f tag=v0.10.0
#
# Reference: docs/research/installer-design.md §5.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build from (e.g. v0.10.0). Must already exist + be reachable from main.'
        required: true
        type: string
      prerelease:
        description: 'Mark this as a prerelease (does not become "latest").'
        required: false
        type: boolean
        default: false
      publish_to_npm:
        description: 'Also publish @cerefox/codefactory + @cerefox/codefactory-native-* to npmjs.com. Irreversible -- npm version numbers are reserved forever once published. Default OFF: GitHub Release only.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write      # gh release create
  actions: read

# Force JavaScript-based actions onto Node 24 (workaround for the
# Node 20 deprecation warning on `actions/upload-artifact@v5` etc.).
# Drop this once all the actions we use ship a Node 24 default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  # ── sanity: tag must exist + be reachable from main ────────────────
  verify:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag → sha + verify on main
        id: resolve
        run: |
          if ! git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag '${{ inputs.tag }}' does not exist. Tag locally + push first."
            exit 1
          fi
          sha="$(git rev-parse "refs/tags/${{ inputs.tag }}^{}")"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          git fetch origin main
          if ! git merge-base --is-ancestor "$sha" origin/main; then
            echo "::error::Tag '${{ inputs.tag }}' (sha $sha) is not an ancestor of main."
            exit 1
          fi

  # ── per-platform native package build ──────────────────────────────
  # Compiles the pinned libsqlite3 + downloads the matching sqlite-vec
  # asset, packs them into @cerefox/codefactory-native-<platform>-X.Y.Z.tgz.
  #
  # Both Mac legs run on macos-14 (arm64). darwin-arm64 builds natively;
  # darwin-x64 cross-compiles via clang's `-arch x86_64` flag, plumbed
  # through scripts/build-sqlite.sh's existing per-platform arch_flag
  # handling. macos-13 (Intel) runners are being phased out by GitHub +
  # have multi-hour queue times on free-tier; cross-compilation from
  # macos-14 is reliable, ~3x faster, and uses one less concurrent
  # runner slot. Decision: 2026-04-30.
  build-native:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # arm64 runner; native build
            platform: darwin-arm64
          - os: macos-14          # arm64 runner; cross-compiles -arch x86_64
            platform: darwin-x64
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build native package
        run: scripts/build-native-package.sh "${{ matrix.platform }}" "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v5
        with:
          name: cfcf-native-${{ matrix.platform }}
          retention-days: 1
          path: |
            dist/cerefox-codefactory-native-${{ matrix.platform }}-*.tgz
            dist/cerefox-codefactory-native-${{ matrix.platform }}-*.tgz.sha256

  # ── single CLI build ────────────────────────────────────────────────
  # The bundled JS is platform-independent (the heavy native deps are
  # externalised; per-platform native lives in build-native above), so
  # one build leg covers all OSes.
  build-cli:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace deps (needed by bun run build:web)
        run: bun install --frozen-lockfile

      - name: Build CLI tarball
        run: scripts/build-cli.sh "${{ inputs.tag }}"

      - uses: actions/upload-artifact@v5
        with:
          name: cfcf-cli
          retention-days: 1
          path: |
            dist/cfcf-*.tgz
            dist/cfcf-*.tgz.sha256

  # ── assemble + publish release ─────────────────────────────────────
  release:
    needs: [build-native, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Assemble SHA256SUMS
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -- *.sha256

      - name: Write MANIFEST.txt
        # Small key:value file so self-update + install.sh can resolve
        # "latest" by following GitHub's release redirect to MANIFEST.txt
        # and parsing the cfcf: line. See packages/cli/src/commands/
        # self-update.ts.
        run: |
          version="${{ inputs.tag }}"
          v_no_prefix="${version#v}"
          cat > dist/MANIFEST.txt <<EOF
          cfcf: $version
          cli-tarball: cfcf-${v_no_prefix}.tgz
          built-at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          EOF

      - name: Copy install script
        run: cp scripts/install.sh dist/

      - name: Write INSTALL.md (asset that explains the release)
        # Self-explanatory README for anyone who lands on the GH Releases
        # page + downloads the .tgz files. Without this, the release
        # page is just "here are 7 files, good luck". Generated inline
        # from the workflow so each release's INSTALL.md references
        # that release's exact version.
        run: |
          version="${{ inputs.tag }}"
          v_no_prefix="${version#v}"
          # Detect what the host platform tag would be for the example
          host_platform="darwin-arm64"  # docs example; user's actual platform varies
          cat > dist/INSTALL.md <<EOF
          # Installing cfcf $version

          The recommended install is **the curl-bash one-liner** — it bootstraps
          Bun + npm if missing, configures npm's prefix to a user-writable
          directory if needed, then runs \`npm install -g @cerefox/codefactory\`
          and hands off to \`cfcf init\`:

          \`\`\`bash
          curl -fsSL https://github.com/fstamatelopoulos/cfcf/releases/latest/download/install.sh | bash
          \`\`\`

          That's the one-liner the README documents and what most users want.

          ---

          ## What the assets in this release are

          If you're here because you want to install offline, in an airgapped
          environment, or pin to this specific version, you can use the
          tarballs directly. Each release contains:

          - \`cfcf-${v_no_prefix}.tgz\` — the CLI package (npm-format tarball)
          - \`cerefox-codefactory-native-darwin-arm64-${v_no_prefix}.tgz\` — pinned libsqlite3 + sqlite-vec for Apple Silicon
          - \`cerefox-codefactory-native-darwin-x64-${v_no_prefix}.tgz\` — same for Intel Macs
          - \`cerefox-codefactory-native-linux-x64-${v_no_prefix}.tgz\` — same for x86_64 Linux
          - \`SHA256SUMS\` — sha256 hashes of the four .tgz files
          - \`MANIFEST.txt\` — machine-readable manifest (used by \`cfcf self-update\` to resolve "latest")
          - \`install.sh\` — the curl-bash installer (what the one-liner above downloads)
          - \`INSTALL.md\` — this file

          ## Manual install from these tarballs

          You need **Bun ≥ 1.3** (cfcf's runtime) and **npm** (install tool, avoids
          Bun's postinstall-blocking issue [oven-sh/bun#4959](https://github.com/oven-sh/bun/issues/4959)).
          Bun: \`curl -fsSL https://bun.sh/install | bash\`. npm: usually comes with Node.js
          (\`brew install node\`, \`nvm install --lts\`, or your distro's package manager).

          Then:

          \`\`\`bash
          # Adjust the platform tag to match your machine: darwin-arm64, darwin-x64, or linux-x64
          PLATFORM=$host_platform

          # Native package first (so the CLI's optionalDependencies entry is satisfied)
          npm install -g ./cerefox-codefactory-native-\${PLATFORM}-${v_no_prefix}.tgz

          # CLI second
          npm install -g ./cfcf-${v_no_prefix}.tgz

          # Verify
          cfcf doctor
          \`\`\`

          ## Verifying the tarballs

          \`\`\`bash
          shasum -a 256 -c SHA256SUMS
          \`\`\`

          ## Provenance

          Each .tgz published to npmjs.com after v0.16.4 ships with a [sigstore
          attestation](https://docs.npmjs.com/generating-provenance-statements)
          linking it to the GitHub Actions run that built it. View on the
          package's npmjs.com page (look for the "Provenance" badge).

          ## Documentation

          - [README](https://github.com/fstamatelopoulos/cfcf#readme) — overview + install
          - [Install guide](https://github.com/fstamatelopoulos/cfcf/blob/main/docs/guides/installing.md) — full path coverage
          - [Troubleshooting](https://github.com/fstamatelopoulos/cfcf/blob/main/docs/guides/troubleshooting.md) — common issues + fixes
          - [User manual](https://github.com/fstamatelopoulos/cfcf/blob/main/docs/guides/manual.md) — concepts + workflow
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          flag="--latest"
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then flag="--prerelease"; fi
          gh release create "${{ inputs.tag }}" \
            --title "${{ inputs.tag }}" \
            --generate-notes \
            --verify-tag \
            $flag \
            dist/cfcf-*.tgz \
            dist/cerefox-codefactory-native-*.tgz \
            dist/SHA256SUMS \
            dist/MANIFEST.txt \
            dist/install.sh \
            dist/INSTALL.md

  # ── npm publish dry-run (always runs; canary) ──────────────────────
  # Validates each tarball's shape against the npm registry without
  # actually publishing. Catches problems that would only otherwise
  # surface during the real publish: malformed package.json, version
  # already taken, name not under our scope, files missing from the
  # tarball, etc. ~5s of cheap signal that runs on every release run
  # regardless of whether the user opted into the real publish leg.
  #
  # No auth needed: dry-run doesn't push anything, so NPM_TOKEN is not
  # consumed here. (If a future npm change ever required auth for
  # dry-run, this job would surface that loudly before the real-publish
  # leg ever runs.)
  npm-dryrun:
    needs: [build-native, build-cli]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: npm publish --dry-run (native packages)
        # `./` prefix on the tarball path is required: without it, npm
        # parses `dist/foo.tgz` as a github shorthand spec (user `dist`,
        # repo `foo.tgz`) and tries `git ls-remote ssh://git@github.com/
        # dist/foo.tgz.git`, which fails with "Permission denied (publickey)".
        # The leading `./` forces npm to treat the argument as a local
        # tarball file. (npm-package-arg parses package specs ambiguously
        # when the path contains a `/` but doesn't start with `./` or `/`.)
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/cerefox-codefactory-native-*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "::error::no native tarballs found in dist/"
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            echo "::group::dry-run $tgz"
            npm publish --dry-run "./$tgz"
            echo "::endgroup::"
          done

      - name: npm publish --dry-run (CLI)
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/cfcf-*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "::error::no CLI tarballs found in dist/"
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            echo "::group::dry-run $tgz"
            npm publish --dry-run "./$tgz"
            echo "::endgroup::"
          done

  # ── npm publish (real; gated + irreversible) ───────────────────────
  # Only runs when the user explicitly checks `publish_to_npm` in the
  # workflow_dispatch UI. Order matters: native packages first (so the
  # CLI's optionalDependencies entries already exist on the registry
  # by the time the CLI manifest lands), CLI second.
  #
  # `--access public` is required on first publish under a scoped name
  # (`@cerefox/...`); npm remembers the setting after that. Set on every
  # call so a fresh package's first publish is always public-by-default.
  #
  # Auth: **npm Trusted Publishing via OIDC** (2026-05-01). No
  # NPM_TOKEN secret -- npm trusts publishes from this repo's
  # release.yml workflow because each of the 4 packages
  # (@cerefox/codefactory + @cerefox/codefactory-native-*) has a
  # Trusted Publisher entry registered on npmjs.com pointing at
  # fstamatelopoulos/cfcf + release.yml. Each workflow run mints a
  # short-lived OIDC token via `permissions: id-token: write`; npm
  # validates it against the registered trust + publishes.
  #
  # The first v0.16.2 publish (2026-05-01) was done with a granular
  # bypass-2FA token because npm's UI requires the package to exist
  # before configuring trusted publishing (chicken-and-egg, npm/cli#8544).
  # Token deleted post-publish; v0.16.3+ go through OIDC.
  #
  # `--provenance` adds a sigstore-signed attestation linking each
  # published tarball to this exact GitHub Actions run. Free security
  # win once OIDC is in place; visible as a "Provenance" badge on
  # npmjs.com.
  #
  # Recommended: bind this job to a GitHub Environment (`npm-publish`)
  # with a required-reviewers approval rule. Configured outside the
  # workflow file (Settings → Environments) so the YAML stays clean.
  npm-publish:
    needs: [build-native, build-cli, npm-dryrun]
    if: ${{ inputs.publish_to_npm }}
    runs-on: ubuntu-latest
    # OIDC token mint requires id-token: write at the job level.
    # contents: read so actions/checkout can fetch the tag's source.
    permissions:
      contents: read
      id-token: write
    # environment: npm-publish    # uncomment after creating the env
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag }}

      # Trusted Publishing requires npm CLI >= 11.5.1 and Node >= 22.14.0.
      # Node 22 ships with npm 10.x, so we explicitly upgrade npm after
      # setup-node. Must use `npm@latest` (or pin >= 11.5.1) -- earlier
      # versions silently fall back to token auth and the publish fails
      # with a non-obvious "401 unauthenticated" instead of "you need a
      # newer npm". Pre-flight check ensures we caught the upgrade before
      # the publish step runs.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to >= 11.5 (Trusted Publishing requirement)
        run: |
          npm install -g npm@latest
          npm --version
          # Sanity check: must be >= 11.5
          installed_major="$(npm --version | cut -d. -f1)"
          installed_minor="$(npm --version | cut -d. -f2)"
          if (( installed_major < 11 )) || (( installed_major == 11 && installed_minor < 5 )); then
            echo "::error::npm $(npm --version) is too old for Trusted Publishing (need >= 11.5)"
            exit 1
          fi

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: npm publish (native packages, first)
        # `./` prefix required on the tarball path -- see npm-dryrun job
        # for the full rationale (npm-package-arg parses `dist/foo.tgz`
        # as a github shorthand otherwise).
        # `--provenance` mints + uploads a sigstore attestation linking
        # this tarball to this GitHub Actions run. No NODE_AUTH_TOKEN:
        # OIDC handles auth via the trusted publisher relationship.
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/cerefox-codefactory-native-*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "::error::no native tarballs found in dist/"
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            echo "::group::publish $tgz"
            npm publish --access public --provenance "./$tgz"
            echo "::endgroup::"
          done

      - name: npm publish (CLI, last)
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/cfcf-*.tgz)
          if [[ ${#tarballs[@]} -eq 0 ]]; then
            echo "::error::no CLI tarballs found in dist/"
            exit 1
          fi
          for tgz in "${tarballs[@]}"; do
            echo "::group::publish $tgz"
            npm publish --access public --provenance "./$tgz"
            echo "::endgroup::"
          done

      - name: Print install hint
        run: |
          echo "::notice::Published to npmjs.com via OIDC trusted publishing. Install with: bun install -g @cerefox/codefactory"
