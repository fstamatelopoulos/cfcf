name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # 5.4: the typecheck references packages/server/src/web-assets.generated.ts,
      # which is produced by `bun run build:web`. The file is gitignored (regenerated
      # per build), so CI must build the web bundle before typechecking.
      - name: Build web bundle (generates web-assets.generated.ts)
        run: bun run build:web

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: cfcf-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: cfcf-darwin-arm64

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # 5.4: web bundle must be built first so the compiled binary includes
      # the embedded web-assets.generated.ts. Without this, the published
      # artifact would have no web GUI.
      - name: Build web bundle
        run: bun run build:web

      - name: Build binary
        run: bun build packages/cli/src/index.ts --compile --outfile ${{ matrix.artifact }} --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          # Default retention is 90 days; that's what hit the
          # account-level artifact storage quota on the v0.9.0 merge
          # (run 24943769789, "Artifact storage quota has been hit").
          # 7 days is plenty for a build-debugging window without
          # accumulating gigabytes per release. The future 5.5 release
          # workflow will use a different mechanism (gh release create
          # with the assets attached to a tag) so it isn't subject to
          # this same per-run-artifact cap.
          retention-days: 7
