name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # 5.4: the typecheck references packages/server/src/web-assets.generated.ts,
      # which is produced by `bun run build:web`. The file is gitignored (regenerated
      # per build), so CI must build the web bundle before typechecking.
      - name: Build web bundle (generates web-assets.generated.ts)
        run: bun run build:web

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun run test

  build:
    needs: test
    # Single Linux runner: the CLI tarball is platform-independent (the
    # heavy native deps live in per-platform @cerefox/cfcf-native-<platform>
    # packages, built only at release time -- see release.yml). This job
    # smokes the build pipeline on every PR so a broken build-cli.sh
    # surfaces here instead of mid-release.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build CLI tarball (smoke)
        run: scripts/build-cli.sh v0.0.0-dev

      - name: Upload CLI tarball
        uses: actions/upload-artifact@v5
        with:
          name: cfcf-cli-tarball
          path: |
            dist/cfcf-*.tgz
            dist/cfcf-*.tgz.sha256
          retention-days: 7
